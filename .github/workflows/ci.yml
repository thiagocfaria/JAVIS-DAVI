name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/jarvis_audio/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/jarvis_audio/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build jarvis_audio (Rust → Python extension)
        run: |
          cd rust/jarvis_audio
          maturin develop --release

      - name: Check Rust compilation
        run: |
          cd rust/jarvis_audio
          cargo check

      - name: Run Python tests
        run: |
          PYTHONPATH=. pytest -q testes/ tests/

      - name: Lint
        run: ruff check jarvis/interface/
