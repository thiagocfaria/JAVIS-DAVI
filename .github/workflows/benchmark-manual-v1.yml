name: benchmark-manual-v1

on:
  workflow_dispatch:
    inputs:
      upload_name:
        description: "Nome opcional do artefato"
        required: false
        default: "benchmarks-json"

jobs:
  benchmark_manual:
    name: Benchmark manual (não-gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Dependências mínimas
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy psutil pytest

      - name: Rodar benchmark (best-effort)
        continue-on-error: true
        run: bash scripts/run_benchmarks.sh

      - name: Publicar JSON de benchmark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.upload_name || 'benchmarks-json' }}
          path: Documentos/archive/benchmarks/**/*.json
          if-no-files-found: warn
